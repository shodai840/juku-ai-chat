<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>進学塾 湊 質問AI</title>

  <!-- Google Fonts（ロゴと同じ明朝系：日本語=Shippori Mincho / 英語=Cormorant Garamond）-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="initKaTeX()"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ログイン・新規登録モーダル -->
<div id="auth-overlay">
  <div id="auth-modal">
    <h2>📚 進学塾 湊 質問AI</h2>
    <div id="auth-tabs">
      <button type="button" id="tab-login" class="auth-tab active">ログイン</button>
      <button type="button" id="tab-register" class="auth-tab">新規登録</button>
    </div>
    <div id="login-pane">
      <input id="login-name-input" class="auth-input" type="text" placeholder="名前" maxlength="50" autocomplete="username">
      <input id="login-password-input" class="auth-input" type="password" placeholder="パスワード" autocomplete="current-password">
      <p id="login-error" class="auth-error"></p>
      <button type="button" id="btn-login-submit" class="auth-btn">ログイン</button>
    </div>
    <div id="register-pane" style="display:none">
      <p>先生の承認が完了するまでは使えません</p>
      <p>名前は必ずフルネーム（苗字と名前）で登録してね</p>
      <input id="register-name-input" class="auth-input" type="text" placeholder="フルネームで入力（例：山田太郎）" maxlength="50" autocomplete="username">
      <input id="register-password-input" class="auth-input" type="password" placeholder="パスワード（4文字以上）" autocomplete="new-password">
      <p id="register-error" class="auth-error"></p>
      <p id="register-success" class="auth-success"></p>
      <button type="button" id="btn-register-submit" class="auth-btn">登録する</button>
    </div>
  </div>
</div>

<!-- 学年・クラス入力モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <h2>📚 学年・クラスを教えてね</h2>
    <p>入力した学年・クラスは先生に見えます</p>
    <label class="modal-label" for="grade-select">学年</label>
    <select id="grade-select">
      <option value="">学年をえらぶ</option>
      <option value="中1">中1</option>
      <option value="中2">中2</option>
      <option value="中3">中3</option>
      <option value="高校生">高校生</option>
      <option value="大学入試過去問">大学入試過去問</option>
    </select>
    <div id="class-field">
      <label class="modal-label" for="class-select">クラス</label>
      <select id="class-select">
        <option value="">クラスをえらぶ</option>
      </select>
    </div>
    <p id="modal-error"></p>
    <button id="btn-name-ok">スタート！</button>
    <p id="modal-note">※ 入力した学年・クラスは先生に見えます</p>
  </div>
</div>

<!-- ヘッダー -->
<header>
  <h1><img class="brand-logo" src="logo.png" alt="湊 ロゴ"> 進学塾 湊 質問AI</h1>
  <div id="student-info">
    <span id="student-name-disp"></span>
    <button id="btn-rename">学年・クラス変更</button>
    <button id="btn-logout">ログアウト</button>
  </div>
</header>

<!-- 注意バー -->
<div id="warn-bar">
  ⚠️ AIは間違えることもあります。わからないところは先生に質問してね！
</div>

<!-- チャット表示エリア -->
<div id="chat-area"></div>

<!-- 入力フォーム -->
<div id="input-area">
  <div id="image-preview-wrap">
    <img id="image-preview-thumb" src="" alt="選択中の画像">
    <button id="btn-remove-img" title="画像を外す">✕</button>
  </div>
  <div id="quick-actions">
    <button id="btn-easier" type="button">🍀 やさしく</button>
    <button id="btn-skip" type="button">⏩ 次のステップ</button>
    <button id="btn-new-problem" type="button">🆕 次の問題</button>
  </div>
  <div id="input-row">
    <textarea id="msg-input" rows="1" maxlength="2000" placeholder="質問を入力…（Shift+Enterで改行）"></textarea>
    <button id="btn-image" title="画像を添付">📷</button>
    <button id="btn-send">送信</button>
  </div>
  <input id="file-input" type="file" accept="image/*">
</div>

<script src="app.js"></script>
</body>
</html>
